name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET Packages
        run: dotnet restore backend/ImageUploader.Api/ImageUploader.Api.csproj

      - name: Build .NET Project
        run: dotnet build backend/ImageUploader.Api/ImageUploader.Api.csproj --configuration Release --no-restore

      - name: Publish .NET Project
        run: dotnet publish backend/ImageUploader.Api/ImageUploader.Api.csproj --configuration Release --output backend/publish

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build React Application
        working-directory: frontend
        run: npm run build

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
